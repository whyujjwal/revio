services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: revio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-revio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revio}
      POSTGRES_DB: ${POSTGRES_DB:-revio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-revio} -d ${POSTGRES_DB:-revio}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: revio_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-revio}:${POSTGRES_PASSWORD:-revio}@postgres:5432/${POSTGRES_DB:-revio}
      MEMORY_DB_PATH: .data/chromadb
      LOG_JSON: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@revio.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-changeme-secret-key}
      RESUME_STORAGE_PATH: .data/resumes
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
    volumes:
      - chromadb_data:/app/apps/api/.data/chromadb
      - resume_data:/app/apps/api/.data/resumes
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── LiveKit Server ──────────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: revio_livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}"
    command: --dev

volumes:
  postgres_data:
  chromadb_data:
  resume_data:
